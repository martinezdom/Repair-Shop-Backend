version: "3.8"

services:
  mysql-db:
    image: mysql:8.0
    container_name: repairshop_mysql
    environment:
      MYSQL_DATABASE: repairshop
      MYSQL_ROOT_PASSWORD: example1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schemas:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pexample1234"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-backend:
    build: .
    container_name: repairshop_api
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql-db:3306/repairshop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: example1234
      JWT_SECRET: repairshop-demo-secret
    depends_on:
      mysql-db:
        condition: service_healthy

volumes:
  mysql_data: